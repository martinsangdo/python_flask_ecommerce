<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop | Minimalist Collection</title>
    <style>
        :root {
            --primary-bg: #f9f9f9;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666;
            --accent: #2563eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-weight: 800;
            letter-spacing: -0.025em;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Responsive Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* Product Card */
        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .image-placeholder {
            width: 100%;
            height: 250px;
            background-color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-weight: 500;
        }

        .product-info {
            padding: 20px;
        }

        .category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0 0 10px 0;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }

        .add-to-cart {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-to-cart:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>New Arrivals</h1>
            <p>Thoughtfully designed pieces for your daily life.</p>
        </header>

        <main class="product-grid">
            <article class="product-card">
                <div class="image-placeholder">Product Image</div>
                <div class="product-info">
                    <div class="category">Accessories</div>
                    <h2 class="product-title">Minimalist Leather Wallet</h2>
                    <div class="price-row">
                        <span class="price">$45.00</span>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="image-placeholder">Product Image</div>
                <div class="product-info">
                    <div class="category">Home Office</div>
                    <h2 class="product-title">Ergonomic Desk Lamp</h2>
                    <div class="price-row">
                        <span class="price">$89.00</span>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="image-placeholder">Product Image</div>
                <div class="product-info">
                    <div class="category">Tech</div>
                    <h2 class="product-title">Noise Cancelling Pods</h2>
                    <div class="price-row">
                        <span class="price">$129.00</span>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="image-placeholder">Product Image</div>
                <div class="product-info">
                    <div class="category">Lifestyle</div>
                    <h2 class="product-title">Recycled Glass Bottle</h2>
                    <div class="price-row">
                        <span class="price">$24.00</span>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </article>
        </main>
    </div>

</body>

</html>
