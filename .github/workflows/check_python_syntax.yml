name: Python Syntax Check
on:
  push:
    branches:
      - main
      - develop
jobs:
  check-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Check syntax with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          # --count: show total number of errors
          # --select=E9,F63,F7,F82: only check for critical logic/syntax errors
          # --show-source: show the actual line of code causing the error
          # --statistics: provide a summary report
          # documentation of flake8 https://flake8.pycqa.org/en/latest/user/index.html
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics